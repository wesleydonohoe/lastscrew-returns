name: Lastscrew
options:
  bundleIdPrefix: com.lastscrew
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    # Upper Upland Ventures, Inc — wesley donohoe's Apple Developer team.
    DEVELOPMENT_TEAM: "DD8M6P7DAQ"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Lastscrew:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Lastscrew
    info:
      path: Sources/Lastscrew/Info.plist
      properties:
        CFBundleDisplayName: LastScrew
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Photograph your packaged item so we can verify it's ready to ship."
        NSPhotoLibraryAddUsageDescription: "Save a copy of your packaging photo for your records."
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.shopping
        # Default points at the Mac's LAN IP so a real device on the same Wi-Fi
        # can reach the local wrangler dev server. Override in scheme env or
        # at production time with your deployed Worker URL (https).
        LASTSCREW_API_BASE: "http://192.168.98.142:8787"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsInWebContent: false
          NSExceptionDomains:
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            192.168.98.142:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lastscrew.lastscrew
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_BITCODE: NO
        SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
        GCC_TREAT_WARNINGS_AS_ERRORS: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
