name: Lastscrew
options:
  bundleIdPrefix: com.lastscrew
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Lastscrew:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Lastscrew
    info:
      path: Sources/Lastscrew/Info.plist
      properties:
        CFBundleDisplayName: Last Screw
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Photograph your packaged item so we can verify it's ready to ship."
        NSPhotoLibraryAddUsageDescription: "Save a copy of your packaging photo for your records."
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.shopping
        LASTSCREW_API_BASE: "http://127.0.0.1:8787"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lastscrew.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
