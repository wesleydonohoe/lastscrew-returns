<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Mid-century walnut writing desk silhouette">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5A1F" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FF5A1F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moltenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC24D"/>
      <stop offset="55%" stop-color="#FF5A1F"/>
      <stop offset="100%" stop-color="#B81E00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#23262B"/>
  <circle cx="400" cy="430" r="320" fill="url(#halo)"/>
  <g fill="url(#moltenGrad)">
    <!-- top -->
    <rect x="80" y="340" width="640" height="50" rx="6"/>
    <!-- side panel left -->
    <rect x="120" y="390" width="100" height="200" rx="4"/>
    <!-- side panel right -->
    <rect x="580" y="390" width="100" height="200" rx="4"/>
    <!-- drawer fronts -->
    <rect x="138" y="410" width="64" height="50" rx="4" fill="#23262B" opacity="0.8"/>
    <rect x="138" y="470" width="64" height="50" rx="4" fill="#23262B" opacity="0.8"/>
    <rect x="138" y="530" width="64" height="50" rx="4" fill="#23262B" opacity="0.8"/>
    <!-- hairpin/leg detail right -->
    <rect x="598" y="410" width="64" height="170" rx="4" fill="#23262B" opacity="0.5"/>
  </g>
  <!-- drawer pulls in acid -->
  <g fill="#A8FF35">
    <circle cx="170" cy="435" r="3"/>
    <circle cx="170" cy="495" r="3"/>
    <circle cx="170" cy="555" r="3"/>
  </g>
  <!-- label -->
  <text x="400" y="710" text-anchor="middle"
        font-family="Helvetica, -apple-system, Arial" font-size="22" font-weight="700"
        letter-spacing="6" fill="#A0A6B0">MID-CENTURY · DESK</text>
  <text x="400" y="745" text-anchor="middle"
        font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600"
        fill="#A8FF35" letter-spacing="2">LASTSCREW</text>
</svg>
