<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Brass arc floor lamp silhouette">
  <defs>
    <radialGradient id="halo" cx="60%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#FFC24D" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF5A1F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC24D"/>
      <stop offset="100%" stop-color="#B81E00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#23262B"/>
  <ellipse cx="540" cy="270" rx="240" ry="180" fill="url(#halo)"/>
  <!-- base -->
  <g fill="url(#brassGrad)">
    <rect x="180" y="630" width="120" height="18" rx="6"/>
    <rect x="220" y="615" width="40" height="20" rx="4"/>
    <!-- pole -->
    <rect x="234" y="270" width="12" height="350"/>
    <!-- arc -->
    <path d="M240 270 C 240 130, 460 130, 540 240" fill="none" stroke="url(#brassGrad)" stroke-width="12" stroke-linecap="round"/>
    <!-- shade -->
    <path d="M520 240 L600 280 L580 360 L500 320 Z"/>
    <!-- highlight on shade -->
    <path d="M520 240 L600 280" stroke="#E8ECF1" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- bulb glow -->
  <circle cx="540" cy="320" r="14" fill="#A8FF35" opacity="0.9"/>
  <circle cx="540" cy="320" r="32" fill="#A8FF35" opacity="0.2"/>
  <!-- label -->
  <text x="400" y="710" text-anchor="middle"
        font-family="Helvetica, -apple-system, Arial" font-size="22" font-weight="700"
        letter-spacing="6" fill="#A0A6B0">ARC · FLOOR LAMP</text>
  <text x="400" y="745" text-anchor="middle"
        font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600"
        fill="#A8FF35" letter-spacing="2">LASTSCREW</text>
</svg>
