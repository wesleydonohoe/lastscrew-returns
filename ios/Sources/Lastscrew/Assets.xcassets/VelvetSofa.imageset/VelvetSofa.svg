<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Velvet sectional sofa silhouette">
  <defs>
    <radialGradient id="halo" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FF5A1F" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF5A1F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moltenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC24D"/>
      <stop offset="55%" stop-color="#FF5A1F"/>
      <stop offset="100%" stop-color="#B81E00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#23262B"/>
  <circle cx="400" cy="440" r="320" fill="url(#halo)"/>
  <!-- sofa silhouette -->
  <g fill="url(#moltenGrad)">
    <!-- back -->
    <rect x="120" y="320" width="560" height="120" rx="18"/>
    <!-- seat -->
    <rect x="100" y="430" width="600" height="80" rx="20"/>
    <!-- armrests -->
    <rect x="80" y="360" width="60" height="180" rx="14"/>
    <rect x="660" y="360" width="60" height="180" rx="14"/>
    <!-- cushions -->
    <rect x="160" y="350" width="160" height="80" rx="12" fill="#E8ECF1" opacity="0.85"/>
    <rect x="320" y="350" width="160" height="80" rx="12" fill="#E8ECF1" opacity="0.85"/>
    <rect x="480" y="350" width="160" height="80" rx="12" fill="#E8ECF1" opacity="0.85"/>
    <!-- legs -->
    <rect x="120" y="540" width="14" height="40" fill="#34383F"/>
    <rect x="666" y="540" width="14" height="40" fill="#34383F"/>
  </g>
  <!-- label -->
  <text x="400" y="710" text-anchor="middle"
        font-family="Helvetica, -apple-system, Arial" font-size="22" font-weight="700"
        letter-spacing="6" fill="#A0A6B0">VELVET · SECTIONAL</text>
  <text x="400" y="745" text-anchor="middle"
        font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600"
        fill="#A8FF35" letter-spacing="2">LASTSCREW</text>
</svg>
