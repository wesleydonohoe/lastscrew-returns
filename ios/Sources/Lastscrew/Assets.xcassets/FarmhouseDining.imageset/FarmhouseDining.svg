<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Farmhouse dining table with six chairs silhouette">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5A1F" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FF5A1F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moltenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC24D"/>
      <stop offset="55%" stop-color="#FF5A1F"/>
      <stop offset="100%" stop-color="#B81E00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#23262B"/>
  <circle cx="400" cy="420" r="320" fill="url(#halo)"/>
  <!-- top-down dining: table center + 6 chairs around -->
  <ellipse cx="400" cy="420" rx="200" ry="80" fill="url(#moltenGrad)"/>
  <ellipse cx="400" cy="412" rx="200" ry="80" fill="none" stroke="#E8ECF1" stroke-width="2" opacity="0.6"/>
  <!-- chairs as rounded rectangles around the table -->
  <g fill="#E8ECF1" opacity="0.85">
    <rect x="120" y="385" width="60" height="70" rx="12"/>
    <rect x="620" y="385" width="60" height="70" rx="12"/>
    <rect x="180" y="290" width="60" height="60" rx="12"/>
    <rect x="560" y="290" width="60" height="60" rx="12"/>
    <rect x="180" y="490" width="60" height="60" rx="12"/>
    <rect x="560" y="490" width="60" height="60" rx="12"/>
  </g>
  <!-- table grain/plank lines -->
  <g stroke="#23262B" stroke-width="2" opacity="0.6">
    <line x1="220" y1="395" x2="580" y2="395"/>
    <line x1="220" y1="420" x2="580" y2="420"/>
    <line x1="220" y1="445" x2="580" y2="445"/>
  </g>
  <!-- label -->
  <text x="400" y="710" text-anchor="middle"
        font-family="Helvetica, -apple-system, Arial" font-size="22" font-weight="700"
        letter-spacing="6" fill="#A0A6B0">FARMHOUSE · DINING</text>
  <text x="400" y="745" text-anchor="middle"
        font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600"
        fill="#A8FF35" letter-spacing="2">LASTSCREW</text>
</svg>
