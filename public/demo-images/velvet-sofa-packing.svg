<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Velvet sofa partially wrapped and lowering into a shipping box">
  <rect width="600" height="400" fill="#FAFAFA"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#E5E5E5" stroke-width="2"/>

  <!-- Open cardboard box -->
  <g>
    <!-- back flap -->
    <path d="M120 140 L480 140 L460 110 L140 110 Z" fill="#C99566" stroke="#8E5A2E" stroke-width="2"/>
    <!-- left side -->
    <path d="M120 140 L120 320 L100 340 L100 160 Z" fill="#A0703C" stroke="#8E5A2E" stroke-width="2"/>
    <!-- right side -->
    <path d="M480 140 L480 320 L500 340 L500 160 Z" fill="#A0703C" stroke="#8E5A2E" stroke-width="2"/>
    <!-- front face -->
    <rect x="120" y="140" width="360" height="180" fill="#C99566" stroke="#8E5A2E" stroke-width="2"/>
    <!-- front flap (folded down) -->
    <path d="M120 320 L480 320 L480 350 L120 350 Z" fill="#B7864A" stroke="#8E5A2E" stroke-width="2"/>
  </g>

  <!-- Sofa being lowered (wrapped) -->
  <g transform="translate(150,120)">
    <rect x="0" y="0" width="300" height="120" rx="14" fill="#7B189F"/>
    <rect x="0" y="0" width="300" height="120" rx="14" fill="url(#wrap)" opacity="0.5"/>
    <!-- wrapping bands -->
    <rect x="0" y="40" width="300" height="6" fill="#FAFAFA" opacity="0.85"/>
    <rect x="0" y="78" width="300" height="6" fill="#FAFAFA" opacity="0.85"/>
    <!-- tape cross -->
    <rect x="140" y="-6" width="20" height="40" fill="#0E9F6E"/>
  </g>

  <!-- Motion arrows down -->
  <g stroke="#7B189F" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M70 80 L70 130"/>
    <path d="M60 120 L70 135 L80 120"/>
    <path d="M530 80 L530 130"/>
    <path d="M520 120 L530 135 L540 120"/>
  </g>

  <!-- Caption -->
  <text x="300" y="380" font-family="-apple-system,Helvetica,Arial" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Velvet Sofa — wrapping &amp; boxing</text>

  <defs>
    <pattern id="wrap" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(20)">
      <rect width="14" height="14" fill="transparent"/>
      <path d="M0 7 L14 7" stroke="#FFF" stroke-width="0.8" opacity="0.4"/>
    </pattern>
  </defs>
</svg>
