<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Walnut desk dismantled into top, legs, drawer, hardware">
  <rect width="600" height="400" fill="#FAFAFA"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#E5E5E5" stroke-width="2"/>

  <!-- Desk top -->
  <g>
    <rect x="60" y="90" width="320" height="40" rx="3" fill="#6B4226"/>
    <rect x="60" y="90" width="320" height="40" rx="3" fill="url(#walnut)" opacity="0.4"/>
    <rect x="60" y="125" width="320" height="8" fill="#4A2D1A"/>
  </g>

  <!-- Legs -->
  <rect x="420" y="90" width="20" height="180" fill="#6B4226"/>
  <rect x="450" y="90" width="20" height="180" fill="#6B4226"/>
  <rect x="480" y="90" width="20" height="180" fill="#6B4226"/>
  <rect x="510" y="90" width="20" height="180" fill="#6B4226"/>

  <!-- Drawer -->
  <g transform="translate(80,200)">
    <rect width="180" height="80" rx="4" fill="#8A5A36"/>
    <rect x="6" y="6" width="168" height="68" rx="3" fill="none" stroke="#4A2D1A" stroke-width="1.5"/>
    <circle cx="90" cy="40" r="6" fill="#1A1A1A"/>
  </g>

  <!-- Side panel -->
  <rect x="290" y="200" width="100" height="80" rx="3" fill="#7A4E2E"/>

  <!-- Hardware bag -->
  <g transform="translate(420,295)">
    <path d="M0 12 L60 12 L60 45 L0 45 Z" fill="#FFF" stroke="#1A1A1A" stroke-width="2"/>
    <path d="M0 12 L60 12 L50 0 L10 0 Z" fill="#E5E5E5" stroke="#1A1A1A" stroke-width="2"/>
    <g fill="#6B4226">
      <rect x="10" y="22" width="14" height="3"/>
      <rect x="28" y="22" width="14" height="3"/>
      <rect x="10" y="30" width="14" height="3"/>
      <rect x="28" y="30" width="14" height="3"/>
    </g>
    <text x="30" y="42" font-family="-apple-system,Helvetica,Arial" font-size="6" fill="#1A1A1A" text-anchor="middle">14 SCREWS</text>
  </g>

  <!-- Allen key -->
  <g transform="translate(500,300)" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M0 30 L0 5 L30 5"/>
  </g>

  <!-- Caption -->
  <text x="300" y="378" font-family="-apple-system,Helvetica,Arial" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Walnut Desk — dismantled</text>

  <defs>
    <pattern id="walnut" width="20" height="40" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q10 15 20 10 M0 30 Q10 35 20 30" stroke="#4A2D1A" stroke-width="0.7" fill="none"/>
    </pattern>
  </defs>
</svg>
