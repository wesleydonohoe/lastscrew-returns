<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Velvet sofa fully packed in a sealed cardboard box with shipping label">
  <rect width="600" height="400" fill="#FAFAFA"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#E5E5E5" stroke-width="2"/>

  <!-- Box body -->
  <g>
    <path d="M90 120 L510 120 L530 100 L110 100 Z" fill="#A0703C" stroke="#8E5A2E" stroke-width="2"/>
    <path d="M510 120 L510 320 L530 300 L530 100 Z" fill="#8E5A2E" stroke="#5E3D1A" stroke-width="2"/>
    <rect x="90" y="120" width="420" height="200" fill="#C99566" stroke="#8E5A2E" stroke-width="2"/>
  </g>

  <!-- Tape seam vertical -->
  <rect x="295" y="100" width="20" height="220" fill="#E8D29A" opacity="0.95"/>
  <rect x="295" y="100" width="20" height="220" fill="none" stroke="#B59A60" stroke-width="1"/>

  <!-- Tape seam horizontal -->
  <rect x="90" y="210" width="420" height="14" fill="#E8D29A" opacity="0.6"/>

  <!-- Shipping label -->
  <g transform="translate(140,150)">
    <rect width="160" height="100" fill="#FFF" stroke="#1A1A1A" stroke-width="1.5" rx="3"/>
    <rect x="0" y="0" width="160" height="22" fill="#7B189F"/>
    <text x="8" y="16" font-family="-apple-system,Helvetica,Arial" font-size="12" font-weight="700" fill="#FFF">LASTSCREW · HOSTED</text>
    <rect x="10" y="32" width="100" height="6" fill="#1A1A1A"/>
    <rect x="10" y="44" width="140" height="4" fill="#9CA3AF"/>
    <rect x="10" y="52" width="120" height="4" fill="#9CA3AF"/>
    <rect x="10" y="60" width="90" height="4" fill="#9CA3AF"/>
    <!-- barcode -->
    <g fill="#1A1A1A">
      <rect x="10" y="72" width="2" height="22"/>
      <rect x="14" y="72" width="1" height="22"/>
      <rect x="17" y="72" width="3" height="22"/>
      <rect x="22" y="72" width="1" height="22"/>
      <rect x="25" y="72" width="2" height="22"/>
      <rect x="29" y="72" width="3" height="22"/>
      <rect x="34" y="72" width="1" height="22"/>
      <rect x="37" y="72" width="2" height="22"/>
      <rect x="41" y="72" width="3" height="22"/>
      <rect x="46" y="72" width="1" height="22"/>
      <rect x="49" y="72" width="2" height="22"/>
      <rect x="53" y="72" width="3" height="22"/>
      <rect x="58" y="72" width="1" height="22"/>
      <rect x="61" y="72" width="2" height="22"/>
      <rect x="65" y="72" width="3" height="22"/>
      <rect x="70" y="72" width="1" height="22"/>
    </g>
  </g>

  <!-- "Fragile" stamp -->
  <g transform="translate(360,170) rotate(-8)">
    <rect width="120" height="40" fill="none" stroke="#C32D2D" stroke-width="2.5" rx="4"/>
    <text x="60" y="26" font-family="-apple-system,Helvetica,Arial" font-size="16" font-weight="800" fill="#C32D2D" text-anchor="middle">FRAGILE</text>
  </g>

  <!-- QA pass badge -->
  <g transform="translate(420,250)">
    <circle r="28" fill="#0E9F6E"/>
    <path d="M-12 0 L-3 10 L14 -10" stroke="#FFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Caption -->
  <text x="300" y="378" font-family="-apple-system,Helvetica,Arial" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Velvet Sofa — boxed &amp; QA-verified</text>
</svg>
