<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Arc floor lamp sealed in a tall narrow box with fragile stamp and shipping label">
  <rect width="600" height="400" fill="#FAFAFA"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#E5E5E5" stroke-width="2"/>

  <!-- Tall box -->
  <g>
    <path d="M200 80 L400 80 L420 60 L220 60 Z" fill="#A0703C" stroke="#8E5A2E" stroke-width="2"/>
    <path d="M400 80 L400 320 L420 300 L420 60 Z" fill="#8E5A2E" stroke="#5E3D1A" stroke-width="2"/>
    <rect x="200" y="80" width="200" height="240" fill="#C99566" stroke="#8E5A2E" stroke-width="2"/>
  </g>

  <!-- Tape -->
  <rect x="200" y="80" width="200" height="14" fill="#E8D29A" opacity="0.9" stroke="#B59A60" stroke-width="0.5"/>
  <rect x="290" y="80" width="20" height="240" fill="#E8D29A" opacity="0.6"/>

  <!-- This side up -->
  <g transform="translate(220,110)" stroke="#1A1A1A" stroke-width="2" fill="none">
    <path d="M0 30 L0 5"/>
    <path d="M-6 12 L0 5 L6 12"/>
    <path d="M16 30 L16 5"/>
    <path d="M10 12 L16 5 L22 12"/>
  </g>

  <!-- FRAGILE big stamp -->
  <g transform="translate(220,165) rotate(-6)">
    <rect width="160" height="44" fill="none" stroke="#C32D2D" stroke-width="3" rx="4"/>
    <text x="80" y="30" font-family="-apple-system,Helvetica,Arial" font-size="20" font-weight="800" fill="#C32D2D" text-anchor="middle">FRAGILE</text>
  </g>

  <!-- Label -->
  <g transform="translate(215,220)">
    <rect width="170" height="92" fill="#FFF" stroke="#1A1A1A" stroke-width="1.5" rx="3"/>
    <rect width="170" height="20" fill="#7B189F"/>
    <text x="6" y="14" font-family="-apple-system,Helvetica,Arial" font-size="11" font-weight="700" fill="#FFF">LASTSCREW · HOSTED</text>
    <text x="8" y="38" font-family="-apple-system,Helvetica,Arial" font-size="11" font-weight="700" fill="#1A1A1A">Arc Floor Lamp</text>
    <rect x="8" y="46" width="150" height="3" fill="#9CA3AF"/>
    <rect x="8" y="54" width="110" height="3" fill="#9CA3AF"/>
    <g fill="#1A1A1A">
      <rect x="8" y="64" width="2" height="22"/>
      <rect x="12" y="64" width="3" height="22"/>
      <rect x="17" y="64" width="1" height="22"/>
      <rect x="20" y="64" width="2" height="22"/>
      <rect x="24" y="64" width="3" height="22"/>
      <rect x="29" y="64" width="1" height="22"/>
      <rect x="32" y="64" width="2" height="22"/>
      <rect x="36" y="64" width="3" height="22"/>
      <rect x="41" y="64" width="1" height="22"/>
      <rect x="44" y="64" width="2" height="22"/>
      <rect x="48" y="64" width="3" height="22"/>
      <rect x="53" y="64" width="1" height="22"/>
      <rect x="56" y="64" width="2" height="22"/>
      <rect x="60" y="64" width="3" height="22"/>
    </g>
  </g>

  <!-- QA pass badge -->
  <g transform="translate(470,250)">
    <circle r="30" fill="#0E9F6E"/>
    <path d="M-12 0 L-3 10 L14 -10" stroke="#FFF" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Caption -->
  <text x="300" y="378" font-family="-apple-system,Helvetica,Arial" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Arc Floor Lamp — boxed &amp; QA-verified</text>
</svg>
