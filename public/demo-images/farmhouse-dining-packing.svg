<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Farmhouse dining table being packed into a long flat box with foam corners">
  <rect width="600" height="400" fill="#FAFAFA"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#E5E5E5" stroke-width="2"/>

  <!-- Open long box -->
  <g>
    <path d="M50 220 L550 220 L530 195 L70 195 Z" fill="#C99566" stroke="#8E5A2E" stroke-width="2"/>
    <path d="M50 220 L50 320 L30 340 L30 240 Z" fill="#A0703C" stroke="#8E5A2E" stroke-width="2"/>
    <path d="M550 220 L550 320 L570 340 L570 240 Z" fill="#A0703C" stroke="#8E5A2E" stroke-width="2"/>
    <rect x="50" y="220" width="500" height="110" fill="#C99566" stroke="#8E5A2E" stroke-width="2"/>
  </g>

  <!-- Foam corner protectors -->
  <rect x="58" y="228" width="40" height="14" fill="#FFF" stroke="#E0E0E0"/>
  <rect x="502" y="228" width="40" height="14" fill="#FFF" stroke="#E0E0E0"/>
  <rect x="58" y="312" width="40" height="14" fill="#FFF" stroke="#E0E0E0"/>
  <rect x="502" y="312" width="40" height="14" fill="#FFF" stroke="#E0E0E0"/>

  <!-- Stacked planks inside (wrapped) -->
  <g>
    <rect x="100" y="245" width="400" height="14" fill="#B98856"/>
    <rect x="100" y="261" width="400" height="14" fill="#A87545"/>
    <rect x="100" y="277" width="400" height="14" fill="#C09666"/>
    <rect x="100" y="293" width="400" height="14" fill="#A87545"/>
  </g>

  <!-- Plastic wrap overlay -->
  <rect x="96" y="241" width="408" height="70" fill="#FFF" opacity="0.25" stroke="#BCD7EE" stroke-width="0.5"/>

  <!-- Trestle leg being lowered -->
  <g transform="translate(220,90)">
    <rect x="0" y="0" width="120" height="14" fill="#7A4E2E"/>
    <rect x="50" y="14" width="20" height="80" fill="#7A4E2E"/>
    <rect x="0" y="92" width="120" height="14" fill="#7A4E2E"/>
    <!-- bubble wrap dots -->
    <g opacity="0.5">
      <circle cx="20" cy="20" r="5" fill="#FFF" stroke="#BCD7EE"/>
      <circle cx="40" cy="20" r="5" fill="#FFF" stroke="#BCD7EE"/>
      <circle cx="60" cy="20" r="5" fill="#FFF" stroke="#BCD7EE"/>
      <circle cx="80" cy="20" r="5" fill="#FFF" stroke="#BCD7EE"/>
      <circle cx="100" cy="20" r="5" fill="#FFF" stroke="#BCD7EE"/>
    </g>
  </g>

  <!-- Motion arrow -->
  <g stroke="#7B189F" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M280 195 L280 215"/>
    <path d="M272 207 L280 218 L288 207"/>
  </g>

  <!-- Caption -->
  <text x="300" y="378" font-family="-apple-system,Helvetica,Arial" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Farmhouse Dining Table — into the box</text>
</svg>
