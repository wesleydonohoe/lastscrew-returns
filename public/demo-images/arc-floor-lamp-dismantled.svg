<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Arc floor lamp dismantled into shade, arc pole sections, base and hardware">
  <rect width="600" height="400" fill="#FAFAFA"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#E5E5E5" stroke-width="2"/>

  <!-- Marble base -->
  <g>
    <ellipse cx="130" cy="320" rx="70" ry="14" fill="#3A3A3A"/>
    <rect x="80" y="280" width="100" height="40" rx="6" fill="#52525B"/>
    <rect x="80" y="280" width="100" height="40" rx="6" fill="url(#marble)" opacity="0.5"/>
    <ellipse cx="130" cy="280" rx="50" ry="10" fill="#71717A"/>
  </g>

  <!-- Pole segment 1 -->
  <g transform="translate(220,80)">
    <rect x="0" y="0" width="14" height="220" rx="4" fill="#52525B"/>
    <rect x="-4" y="-6" width="22" height="10" rx="3" fill="#1A1A1A"/>
    <rect x="-4" y="216" width="22" height="10" rx="3" fill="#1A1A1A"/>
  </g>

  <!-- Pole segment 2 (curved) -->
  <g transform="translate(280,90)">
    <path d="M0 200 Q0 60 80 30" stroke="#52525B" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="200" r="9" fill="#1A1A1A"/>
    <circle cx="80" cy="30" r="9" fill="#1A1A1A"/>
  </g>

  <!-- Lamp shade -->
  <g transform="translate(440,80)">
    <path d="M0 30 L100 30 L80 100 L20 100 Z" fill="#F4E5C2" stroke="#A88B4E" stroke-width="2"/>
    <path d="M0 30 L100 30 L100 26 L0 26 Z" fill="#A88B4E"/>
    <line x1="20" y1="40" x2="20" y2="95" stroke="#A88B4E" stroke-width="0.6"/>
    <line x1="40" y1="40" x2="36" y2="95" stroke="#A88B4E" stroke-width="0.6"/>
    <line x1="60" y1="40" x2="64" y2="95" stroke="#A88B4E" stroke-width="0.6"/>
    <line x1="80" y1="40" x2="80" y2="95" stroke="#A88B4E" stroke-width="0.6"/>
  </g>

  <!-- Bulb -->
  <g transform="translate(420,220)">
    <path d="M20 0 Q40 0 40 20 Q40 30 30 35 L30 45 L10 45 L10 35 Q0 30 0 20 Q0 0 20 0 Z" fill="#FFF6CC" stroke="#A88B4E" stroke-width="1.5"/>
    <rect x="10" y="45" width="20" height="6" fill="#9CA3AF"/>
    <rect x="11" y="51" width="18" height="3" fill="#71717A"/>
  </g>

  <!-- Hardware bag -->
  <g transform="translate(500,285)">
    <path d="M0 12 L60 12 L60 45 L0 45 Z" fill="#FFF" stroke="#1A1A1A" stroke-width="2"/>
    <path d="M0 12 L60 12 L50 0 L10 0 Z" fill="#E5E5E5" stroke="#1A1A1A" stroke-width="2"/>
    <g fill="#52525B">
      <circle cx="15" cy="24" r="3"/>
      <circle cx="30" cy="24" r="3"/>
      <circle cx="45" cy="24" r="3"/>
      <rect x="10" y="32" width="40" height="3"/>
    </g>
  </g>

  <!-- Caption -->
  <text x="300" y="378" font-family="-apple-system,Helvetica,Arial" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="middle">Arc Floor Lamp — dismantled</text>

  <defs>
    <pattern id="marble" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M0 15 Q15 5 30 15" stroke="#FFF" stroke-width="0.6" fill="none" opacity="0.5"/>
      <path d="M0 25 Q15 18 30 25" stroke="#FFF" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
  </defs>
</svg>
